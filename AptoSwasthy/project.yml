name: AptoSwasthy
options:
  bundleIdPrefix: com.aptoswasthy
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  AptoSwasthy:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/AptoSwasthy
        excludes:
          - "**/*.md"
    resources:
      - Sources/AptoSwasthy/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aptoswasthy.app
        PRODUCT_NAME: AptoSwasthy
        INFOPLIST_FILE: Sources/AptoSwasthy/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_BITCODE: NO
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    dependencies:
      - sdk: SceneKit.framework
      - sdk: ModelIO.framework
      - sdk: HealthKit.framework
      - sdk: AVFoundation.framework
      - sdk: PDFKit.framework
      - sdk: LocalAuthentication.framework
      - sdk: UserNotifications.framework
    entitlements:
      path: Sources/AptoSwasthy/Resources/AptoSwasthy.entitlements

schemes:
  AptoSwasthy:
    build:
      targets:
        AptoSwasthy: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
